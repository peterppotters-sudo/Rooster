<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ploegen Rooster</title>
    <style>
        :root {
            --bg: #e0e4e8; --surf: #ffffff; --prim: #2c3e50; --on-surf: #333333;
            --c-o: #ffe082; --c-m: #90caf9; --c-n: #d1c4e9;
            --t-o: #5d4037; --t-m: #0d47a1; --t-n: #4527a0;
        }
        [data-theme="dark"] {
            --bg: #1a1c1e; --surf: #2d2f31; --prim: #8ab4f8; --on-surf: #e2e2e6;
            --c-o: #5d4037; --c-m: #1565c0; --c-n: #4527a0;
            --t-o: #ffe082; --t-m: #bbdefb; --t-n: #d1c4e9;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--on-surf); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .content { flex: 1; overflow-y: scroll; padding: 4px; -webkit-overflow-scrolling: touch; padding-bottom: 100px; }
        
        .month-header { padding: 25px 8px 8px; font-weight: 900; color: var(--prim); font-size: 1.3em; border-bottom: 3px solid var(--prim); text-transform: uppercase; }
        .grid-main { display: grid; grid-template-columns: 26px repeat(7, 1fr); gap: 2px; width: 100%; margin-top: 8px; }
        .grid-label { font-size: 12px; font-weight: 900; opacity: 0.7; text-align: center; padding-bottom: 6px; }
        .week-num { font-size: 10px; font-weight: bold; opacity: 0.5; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.06); height: 65px; border-radius: 4px; }
        
        .day-cell { background: var(--surf); height: 65px; border-radius: 4px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; border: 1px solid rgba(0,0,0,0.05); padding-top: 4px; }
        .day-num { font-size: 16px; font-weight: 900; height: 20px; display: flex; align-items: center; margin-bottom: 2px; }
        .shift-info { flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; }

        /* Vandaag markering */
        .today-highlight { border: 3px solid #2c3e50 !important; }
        [data-theme="dark"] .today-highlight { border-color: var(--prim) !important; }

        /* Bolletjes en kleuren */
        .shift-row { display: flex; gap: 1px; justify-content: center; align-items: center; width: 100%; height: 100%; }
        .s-box { position: relative; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; z-index: 1; font-size: 14px; font-weight: 900; }
        
        /* Specifieke tekstkleuren voor de letters/cijfers in de bolletjes */
        .s-o { color: var(--t-o); } .s-m { color: var(--t-m); } .s-n { color: var(--t-n); }
        
        .dot-hl::before { content: ''; position: absolute; width: 22px; height: 22px; border-radius: 50%; z-index: -1; top: 0; left: 0; }
        .dot-o::before { background-color: var(--c-o); }
        .dot-m::before { background-color: var(--c-m); }
        .dot-n::before { background-color: var(--c-n); }

        #todayBtn { position: fixed; bottom: 95px; right: 16px; background: #2c3e50; color: white; border: none; border-radius: 12px; padding: 12px 18px; font-weight: 800; z-index: 100; font-size: 13px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }

        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; z-index: 150; 
            background: #2c3e50; padding-bottom: env(safe-area-inset-bottom);
            display: flex; height: 75px; align-items: center; justify-content: space-around;
        }
        
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; height: 100%; border: none; background: none; }
        .nav-item.active { background: rgba(255,255,255,0.1); }
        .nav-label { font-size: 10px; font-weight: 800; text-transform: uppercase; margin-top: 4px; opacity: 0.8; }
        .nav-icon { font-size: 22px; }

        .ploeg-select-wrapper { flex: 1.2; display: flex; justify-content: center; align-items: center; height: 100%; }
        #ploegSelect { 
            background: #ffffff; color: #2c3e50; border: none; 
            padding: 8px 10px; border-radius: 8px; font-weight: 900; 
            font-size: 15px; width: 90%; outline: none;
        }
    </style>
</head>
<body onload="init()">

<button id="todayBtn" onclick="scrollToToday('smooth')">VANDAAG</button>

<div class="content" id="viewer"></div>

<nav class="bottom-nav">
    <div class="ploeg-select-wrapper">
        <select id="ploegSelect" onchange="render()">
            <option value="1">Ploeg 1</option>
            <option value="2">Ploeg 2</option>
            <option value="3">Ploeg 3</option>
            <option value="4" selected>Ploeg 4</option>
            <option value="5">Ploeg 5</option>
        </select>
    </div>

    <button id="btn-month-ind" class="nav-item active" onclick="setView('month-ind')">
        <span class="nav-icon">🗓️</span>
        <span class="nav-label" id="label-ind">Ploeg 4</span>
    </button>

    <button id="btn-month-all" class="nav-item" onclick="setView('month-all')">
        <span class="nav-icon">👥</span>
        <span class="nav-label">Alle Ploegen</span>
    </button>

    <button class="nav-item" onclick="toggleTheme()">
        <span class="nav-icon">🌓</span>
        <span class="nav-label">Thema</span>
    </button>
</nav>

<script>
    let curView = 'month-ind';
    const REF = new Date(2026, 4, 5); 
    const OFFSETS = { "1": 28, "2": 7, "3": 21, "4": 0, "5": 14 };
    
    const cycle = [];
    const add = (n, t) => { for(let i=0; i<n; i++) cycle.push(t); };
    add(4,'o'); add(2,'v'); add(3,'m'); add(1,'v'); add(4,'n'); add(4,'v');
    add(3,'o'); add(2,'v'); add(4,'m'); add(1,'v'); add(3,'n'); add(4,'v');

    function getS(p, d) {
        const target = new Date(d.getFullYear(), d.getMonth(), d.getDate());
        const diff = Math.floor((target - REF) / 86400000);
        let idx = (OFFSETS[p] + diff) % 35;
        return cycle[idx < 0 ? idx + 35 : idx];
    }

    function getWeekNumber(d) {
        let tempDate = new Date(d.getTime());
        tempDate.setDate(tempDate.getDate() + 4 - (tempDate.getDay() || 7));
        let yearStart = new Date(tempDate.getFullYear(), 0, 1);
        return Math.ceil((((tempDate - yearStart) / 86400000) + 1) / 7);
    }

    function render() {
        const container = document.getElementById('viewer');
        const selP = document.getElementById('ploegSelect').value;
        document.getElementById('label-ind').innerText = 'Ploeg ' + selP;

        const todayStr = new Date().toDateString();
        let html = '';
        const startDate = new Date(); startDate.setMonth(startDate.getMonth() - 3);
        const endDate = new Date(); endDate.setFullYear(endDate.getFullYear() + 2);
        const months = ["Januari","Februari","Maart","April","Mei","Juni","Juli","Augustus","September","Oktober","November","December"];
        const dayLabels = ['W','M','D','W','D','V','Z','Z'];
        let lastMonth = -1;

        for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
            const isToday = d.toDateString() === todayStr;
            const shift = getS(selP, d);
            const todayClass = isToday ? 'today-highlight' : '';
            const todayId = isToday ? 'id="today"' : '';

            if (d.getMonth() !== lastMonth) {
                if (lastMonth !== -1) html += `</div>`;
                html += `<div class="month-header">${months[d.getMonth()]} ${d.getFullYear()}</div><div class="grid-main">`;
                dayLabels.forEach(l => html += `<div class="grid-label">${l}</div>`);
                let firstDay = new Date(d.getFullYear(), d.getMonth(), 1).getDay();
                let padding = firstDay === 0 ? 6 : firstDay - 1;
                html += `<div class="week-num">${getWeekNumber(d)}</div>`;
                for(let p=0; p<padding; p++) html += `<div style="background:transparent;"></div>`;
                lastMonth = d.getMonth();
            } else if (d.getDay() === 1) {
                html += `<div class="week-num">${getWeekNumber(d)}</div>`;
            }

            let cellContent = `<div class="day-cell ${todayClass}" ${todayId}>`;
            cellContent += `<span class="day-num">${d.getDate()}</span>`;
            cellContent += `<div class="shift-info">`;

            if (curView === 'month-all') {
                let o="-", m="-", n="-";
                for(let p=1; p<=5; p++) { 
                    let s = getS(p.toString(), d); 
                    if(s==='o') o=p; if(s==='m') m=p; if(s==='n') n=p; 
                }
                let dotO = (selP == o) ? 'dot-hl dot-o' : '';
                let dotM = (selP == m) ? 'dot-hl dot-m' : '';
                let dotN = (selP == n) ? 'dot-hl dot-n' : '';
                cellContent += `<div class="shift-row">
                    <span class="s-box s-o ${dotO}">${o}</span>
                    <span class="s-box s-m ${dotM}">${m}</span>
                    <span class="s-box s-n ${dotN}">${n}</span>
                </div>`;
            } else {
                if(shift !== 'v') {
                    let dotClass = `dot-hl dot-${shift}`;
                    let textClass = `s-${shift}`;
                    cellContent += `<span class="s-box ${textClass} ${dotClass}">${shift.toUpperCase()}</span>`;
                }
            }
            
            cellContent += `</div></div>`;
            html += cellContent;
        }
        html += `</div>`;
        container.innerHTML = html;
        scrollToToday('auto');
    }

    function setView(v) { 
        curView = v; 
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active')); 
        document.getElementById('btn-' + v).classList.add('active'); 
        render(); 
    }
    function scrollToToday(mode) { const todayEl = document.getElementById('today'); if (todayEl) todayEl.scrollIntoView({ behavior: mode, block: 'center' }); }
    function toggleTheme() { document.body.hasAttribute('data-theme') ? document.body.removeAttribute('data-theme') : document.body.setAttribute('data-theme', 'dark'); }
    function init() { render(); }
</script>
</body>
</html>
