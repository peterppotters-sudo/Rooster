<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ploegen Rooster</title>
    <style>
        :root {
            --bg: #f4f7f9; --surf: #ffffff; --prim: #2c3e50; --on-surf: #333333;
            --c-o: #ffe082; --c-m: #90caf9; --c-n: #d1c4e9;
            --t-o: #5d4037; --t-m: #0d47a1; --t-n: #4527a0;
        }
        [data-theme="dark"] {
            --bg: #1a1c1e; --surf: #2d2f31; --prim: #8ab4f8; --on-surf: #e2e2e6;
            --c-o: #5d4037; --c-m: #1565c0; --c-n: #4527a0;
            --t-o: #ffe082; --t-m: #bbdefb; --t-n: #d1c4e9;
        }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--on-surf); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { padding: 12px 16px; display: flex; justify-content: center; align-items: center; background: var(--surf); box-shadow: 0 2px 8px rgba(0,0,0,0.1); z-index: 20; flex-shrink: 0; }
        .content { flex: 1; overflow-y: scroll; padding: 8px; -webkit-overflow-scrolling: touch; padding-bottom: 140px; }
        
        .card { background: var(--surf); border-radius: 12px; padding: 14px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(0,0,0,0.05); min-height: 75px; }
        .card-info { display: flex; flex-direction: column; }
        .card-date { font-size: 16px; font-weight: 800; }
        .card-time { font-size: 13px; font-weight: 600; margin-top: 2px; }
        
        .hl-o { background-color: var(--c-o) !important; color: var(--t-o) !important; }
        .hl-m { background-color: var(--c-m) !important; color: var(--t-m) !important; }
        .hl-n { background-color: var(--c-n) !important; color: var(--t-n) !important; }
        
        .today-highlight { border: 3px solid #34495e !important; }
        [data-theme="dark"] .today-highlight { border-color: var(--prim) !important; }

        .badge { padding: 6px 12px; border-radius: 8px; font-weight: 900; text-transform: uppercase; font-size: 12px; }
        
        .shift-row { display: flex; gap: 4px; font-weight: 800; font-size: 14px; align-items: center; justify-content: center; }
        .s-box { position: relative; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; z-index: 1; }
        .s-o { color: #e67e22; } .s-m { color: #2980b9; } .s-n { color: #8e44ad; }

        .dot-hl::before { 
            content: ''; position: absolute; width: 22px; height: 22px; 
            border-radius: 50%; z-index: -1; top: 0; left: 0; 
        }
        .dot-o::before { background-color: var(--c-o); }
        .dot-m::before { background-color: var(--c-m); }
        .dot-n::before { background-color: var(--c-n); }

        .month-header { padding: 20px 0 8px 4px; font-weight: bold; color: var(--prim); font-size: 1.1em; border-bottom: 2px solid var(--prim); margin-top: 8px; text-transform: uppercase; }
        
        .grid-main { display: grid; grid-template-columns: 25px repeat(7, 1fr); gap: 2px; margin-bottom: 16px; margin-top: 8px; width: 100%; }
        .grid-label { font-size: 10px; font-weight: bold; opacity: 0.5; text-align: center; padding-bottom: 4px; }
        .week-num { font-size: 10px; font-weight: bold; opacity: 0.4; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.03); border-radius: 4px; height: 58px; }
        
        .day-cell { background: var(--surf); height: 58px; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid rgba(0,0,0,0.03); }
        .day-num { font-size: 11px; margin-bottom: 2px; font-weight: bold; opacity: 0.7; }

        /* Floating Action Button (Vandaag) */
        #todayBtn { position: fixed; bottom: 145px; right: 16px; background: #2c3e50; color: white; border: none; border-radius: 8px; padding: 10px 18px; font-weight: bold; z-index: 100; font-size: 13px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        /* Bottom Controls Wrapper */
        .bottom-nav-wrapper { position: fixed; bottom: 0; width: 100%; z-index: 150; background: #2c3e50; border-top: 1px solid rgba(255,255,255,0.1); padding-bottom: env(safe-area-inset-bottom); }
        
        /* Settings Bar (Ploeg & Thema) */
        .settings-bar { display: flex; justify-content: space-between; align-items: center; padding: 8px 16px; background: rgba(0,0,0,0.2); }
        .settings-bar select { background: white; border: none; padding: 5px 10px; border-radius: 5px; font-weight: bold; font-size: 14px; }
        
        /* Nav Bar (Tabs) */
        .nav-tabs { height: 65px; display: flex; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: white; opacity: 0.6; cursor: pointer; }
        .nav-btn.active { opacity: 1; background: rgba(255,255,255,0.1); border-top: 3px solid #ecf0f1; }
        .nav-icon { font-size: 18px; margin-bottom: 2px; }
    </style>
</head>

        <select id="ploegSelect" onchange="render()">
            <option value="1">Ploeg 1</option><option value="2">Ploeg 2</option><option value="3">Ploeg 3</option><option value="4" selected>Ploeg 4</option><option value="5">Ploeg 5</option>

        <div id="btn-month-all" class="nav-btn" onclick="setView('month-all')"><span class="nav-icon">📊</span>M-Alle</div>
    </nav>
</div>

<script>
    let curView = 'week-ind';
    const REF = new Date(2026, 4, 5); 
    const OFFSETS = { "1": 28, "2": 7, "3": 21, "4": 0, "5": 14 };
    const TIMES = { o: '06:30 - 15:30', m: '15:30 - 23:30', n: '23:30 - 06:30' };
    const NAMES = { o: 'Ochtend', m: 'Middag', n: 'Nacht', v: '' };
    
    const cycle = [];
    const add = (n, t) => { for(let i=0; i<n; i++) cycle.push(t); };
    add(4,'o'); add(2,'v'); add(3,'m'); add(1,'v'); add(4,'n'); add(4,'v');
    add(3,'o'); add(2,'v'); add(4,'m'); add(1,'v'); add(3,'n'); add(4,'v');

    function getS(p, d) {
        const target = new Date(d.getFullYear(), d.getMonth(), d.getDate());
        const diff = Math.floor((target - REF) / 86400000);
        let idx = (OFFSETS[p] + diff) % 35;
        return cycle[idx < 0 ? idx + 35 : idx];
    }

    function getWeekNumber(d) {
        let tempDate = new Date(d.getTime());
        tempDate.setDate(tempDate.getDate() + 4 - (tempDate.getDay() || 7));
        let yearStart = new Date(tempDate.getFullYear(), 0, 1);
        return Math.ceil((((tempDate - yearStart) / 86400000) + 1) / 7);
    }

    function render() {
        const container = document.getElementById('viewer');
        const selP = document.getElementById('ploegSelect').value;
        const todayStr = new Date().toDateString();
        let html = '';
        
        const startDate = new Date(); startDate.setFullYear(startDate.getFullYear() - 1);
        const endDate = new Date(); endDate.setFullYear(endDate.getFullYear() + 1);
        const months = ["Januari","Februari","Maart","April","Mei","Juni","Juli","Augustus","September","Oktober","November","December"];
        const dayNames = ['Zo','Ma','Di','Wo','Do','Vr','Za'];
        const dayLabels = ['W','M','D','W','D','V','Z','Z'];

        let lastMonth = -1;

        for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
            const isToday = d.toDateString() === todayStr;
            const shift = getS(selP, d);
            const hlClass = (curView.includes('ind') && shift !== 'v') ? `hl-${shift}` : '';
            const todayClass = isToday ? 'today-highlight' : '';
            const todayId = isToday ? 'id="today"' : '';

            if (curView.includes('month')) {
                if (d.getMonth() !== lastMonth) {
                    if (lastMonth !== -1) html += `</div>`;
                    html += `<div class="month-header">${months[d.getMonth()]} ${d.getFullYear()}</div><div class="grid-main">`;
                    dayLabels.forEach(l => html += `<div class="grid-label">${l}</div>`);
                    let firstDay = new Date(d.getFullYear(), d.getMonth(), 1).getDay();
                    let padding = firstDay === 0 ? 6 : firstDay - 1;
                    html += `<div class="week-num">${getWeekNumber(d)}</div>`;
                    for(let p=0; p<padding; p++) html += `<div style="background:transparent; border:none;"></div>`;
                    lastMonth = d.getMonth();
                } else if (d.getDay() === 1) {
                    html += `<div class="week-num">${getWeekNumber(d)}</div>`;
                }
            }

            if (curView === 'week-ind') {
                html += `<div class="card ${hlClass} ${todayClass}" ${todayId}><div class="card-info"><span class="card-date">${dayNames[d.getDay()]} ${d.getDate()}</span>${shift !== 'v' ? `<span class="card-time">${TIMES[shift]}</span>` : ''}</div>${shift !== 'v' ? `<div class="badge">${NAMES[shift]}</div>` : ''}</div>`;
            } else if (curView === 'week-all') {
                let o="-", m="-", n="-";
                for(let p=1; p<=5; p++) { let s = getS(p.toString(), d); if(s==='o') o=p; if(s==='m') m=p; if(s==='n') n=p; }
                let hlWeek = (selP == o) ? 'hl-o' : (selP == m) ? 'hl-m' : (selP == n) ? 'hl-n' : '';
                html += `<div class="card ${hlWeek} ${todayClass}" ${todayId}><div class="card-info"><span class="card-date">${d.getDate()} ${months[d.getMonth()].substring(0,3)}</span>${shift !== 'v' ? `<span class="card-time">${TIMES[shift]}</span>` : ''}</div><div class="shift-row"><span class="s-box s-o">${o}</span><span class="s-box s-m">${m}</span><span class="s-box s-n">${n}</span></div></div>`;
            } else if (curView === 'month-all') {
                let o="-", m="-", n="-";
                for(let p=1; p<=5; p++) { let s = getS(p.toString(), d); if(s==='o') o=p; if(s==='m') m=p; if(s==='n') n=p; }
                let dotO = (selP == o) ? 'dot-hl dot-o' : '';
                let dotM = (selP == m) ? 'dot-hl dot-m' : '';
                let dotN = (selP == n) ? 'dot-hl dot-n' : '';
                html += `<div class="day-cell ${todayClass}" ${todayId}><span class="day-num">${d.getDate()}</span><div class="shift-row"><span class="s-box s-o ${dotO}">${o}</span><span class="s-box s-m ${dotM}">${m}</span><span class="s-box s-n ${dotN}">${n}</span></div></div>`;
            } else if (curView === 'month-ind') {
                html += `<div class="day-cell ${hlClass} ${todayClass}" ${todayId}><span class="day-num">${d.getDate()}</span><span style="font-weight:900; font-size:13px;">${shift !== 'v' ? shift.toUpperCase() : ''}</span></div>`;
            }
        }
        if (curView.includes('month')) html += `</div>`;
        container.innerHTML = html;
        scrollToToday('auto');
    }

    function setView(v) { curView = v; document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-' + v).classList.add('active'); render(); }
    function scrollToToday(mode) { const todayEl = document.getElementById('today'); if (todayEl) todayEl.scrollIntoView({ behavior: mode, block: 'center' }); }
    function toggleTheme() { document.body.hasAttribute('data-theme') ? document.body.removeAttribute('data-theme') : document.body.setAttribute('data-theme', 'dark'); }
    function init() { render(); }
</script>
</body>

    <script>
        // Uitgebreid naar 100 iconen en REX vervangen door 🦖
        const origineleIcoontjes = [
            "🚀", "💎", "🍎", "👾", "🦄", "🦁", "🦖", "🍦", "🍕", "⚽",

            "🐱", "🐶", "🐰", "🦊", "🐯", "🐨", "🐷", "🐸", "🦓", "🐙",
            "🦀", "🐠", "🐦", "🐥", "🦉", "🦇", "🦋", "🐌", "🐞", "🌻",

            "🧁", "🍬", "🥓", "🥩", "🍣", "🥟", "🥛", "🍹", "🏔️", "🌋",

        let beschikbareIcoontjes = [...origineleIcoontjes], verdiendeLijst = [];
        
        const standaardLijstTitels = ["MKM", "2 Letter", "B / D", "Eigen lijst"];
        const standaardLijsten = [
            "aap, bak, bal, bes, bok, bom, bos, dag, dam, den, dik, dop, gum, heg, hek, hok, hut, jas, kam, kan, kar, kat, kip, koe, kop, lam, les, lip, lot, man, mat, mes, mug, mus, nat, nek, net, oom, oog, oor, pan, pen, pop, put, rek, rem, rok, rol, sap, sok, tak, tas, ton, top, val, vat, ver, vis, vos, wal, web, weg, wig, wip, wol, zak, zee, zon",
            "de, het, een, ga, nu, op, af, in, te, na, ja, om, zo, pa, ma, er, is, of, ik, je, we, ze, bij, uw, ei, ui",
            "bak, bal, bas, bel, bes, bik, bil, bok, bol, bom, bos, bus, bank, berg, bril, boek, boos, boom, dag, dal, dam, dan, dat, dek, den, dik, dip, dit, doe, dof, dog, dok, dol, don, dop, dor, dot, dorp, doos, duif, dier, duur, drop, band, blad, bed, bad, bod, bied, daal, deel, doel, duin, dauw",
            "hier, komen, jouw, eigen, woorden"
        ];

        let lijsten = [];

        function initLijsten() {
            for(let i=0; i<4; i++) {
                const opgeslagenNaam = localStorage.getItem('leeslijst_naam_' + i);
                const naam = opgeslagenNaam ? opgeslagenNaam : standaardLijstTitels[i];
                document.getElementById('name-' + i).value = naam;
                document.getElementById('btn-lijst-' + i).innerText = naam;

                const opgeslagenWoorden = localStorage.getItem('leeslijst_' + i);
                const inhoud = opgeslagenWoorden ? opgeslagenWoorden : standaardLijsten[i];
                document.getElementById('edit-' + i).value = inhoud;
                lijsten[i] = inhoud.split(',').map(s => s.trim()).filter(s => s !== "");
            }
        }

        function updateList(index) {
            const nieuweNaam = document.getElementById('name-' + index).value || standaardLijstTitels[index];
            localStorage.setItem('leeslijst_naam_' + index, nieuweNaam);
            document.getElementById('btn-lijst-' + index).innerText = nieuweNaam;

            const raw = document.getElementById('edit-' + index).value;
            localStorage.setItem('leeslijst_' + index, raw);
            lijsten[index] = raw.split(',').map(s => s.trim()).filter(s => s !== "");
        }

        // Sessie reset: bewaart woorden, wist voortgang
        function softReset() {
            clearInterval(interval);
            timerGestart = false;
            woordenTeller = 0;
            goedTeller = 0;
            geschiedenis = [];
            verdiendeLijst = [];
            beschikbareIcoontjes = [...origineleIcoontjes];
            
            document.getElementById('reward-container').innerHTML = '';
            document.getElementById('eind-scherm').style.display = 'none';
            document.getElementById('woord').innerText = '---';
            document.getElementById('timer-display').style.opacity = '0';
            document.getElementById('stop-knop').style.display = 'none';
            document.getElementById('start-btn-main').disabled = false;
            document.getElementById('start-btn-main').innerText = "START";
            
            // UI Counters resetten
            if(mode==='toets') {
                document.getElementById('reward-counter').innerText = `Woord: 0 / 25`;
            } else {
                document.getElementById('reward-counter').innerText = `🎁: 0 / 100`;
                document.getElementById('word-counter-display').innerText = `Woorden: 0`;
            }
        }

        // Hard reset: wist alles uit browsergeheugen
        function hardReset() {
            if(confirm("LET OP: Dit wist al je eigen woordenlijsten en namen definitief! Doorgaan?")) {
                localStorage.clear();
                location.reload();
            }
        }

        const MAX_TOETS_WOORDEN = 25;
        let huidigeLijstIndex = 0, mode = 'normaal', uniekeToetsLijst = [], woordenTeller = 0, goedTeller = 0;
        let timerGestart = false, interval, resterendeTijd = 600, geschiedenis = [], startTijdMS = 0, huidigFlitsWoord = "";

        function toggleSettings() { const o = document.getElementById('settings-overlay'); o.style.display = (o.style.display==='flex')?'none':'flex'; }
        function toggleFS() { if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }

        function generateStars() {
            const c = document.getElementById('stars-container');
            for(let i=0; i<60; i++){
                const s = document.createElement('div');
                s.className = `star ${['sm','md','lg'][Math.floor(Math.random()*3)]}`;

        function switchMode(m) {
            if(timerGestart && mode==='toets') return;
            mode = m;
            document.getElementById('m-n').classList.toggle('active', m==='normaal');
            document.getElementById('m-t').classList.toggle('active', m==='toets');

        }

        function setLijst(index, btn) {
            if(timerGestart && mode==='toets') return;
            huidigeLijstIndex = index;
            document.querySelectorAll('.button-grid .optie-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

        function startNieuwWoord() {
            const lijst = lijsten[huidigeLijstIndex];

            if(!timerGestart && mode==='toets') uniekeToetsLijst = [...lijst].sort(() => Math.random()-0.5);
            
            if(mode==='toets'){

                document.getElementById('reward-counter').innerText = `Woord: ${woordenTeller+1} / ${MAX_TOETS_WOORDEN}`;

                huidigFlitsWoord = lijst[Math.floor(Math.random()*lijst.length)];

            geschiedenis.push(huidigFlitsWoord);

            const wordWidth = ruler.offsetWidth;

            if(!timerGestart){
                timerGestart = true; startTijdMS = Date.now();
                document.getElementById('stop-knop').style.display = 'block';
                if(mode==='normaal'){
                    resterendeTijd = (parseInt(document.getElementById('min-in').value)||10)*60;
                    document.getElementById('timer-display').style.opacity = '1';
                    interval = setInterval(() => { resterendeTijd--; updateTimerDisplay(); if(resterendeTijd<=0) stopSpel(); }, 1000);
                }
            }
            
            const woordEl = document.getElementById('woord');
            woordEl.innerText = w;
            document.getElementById('start-btn-main').disabled = true;
            document.getElementById('btn-goed').style.display = 'none';
            document.getElementById('btn-fout').style.display = 'none';

            document.querySelectorAll('.progress-wrapper').forEach(p => {
                p.style.visibility = 'visible'; p.style.width = (wordWidth+20)+'px';
            });
            document.querySelectorAll('.progress-bar').forEach(b => {
                b.style.animation = 'none'; b.offsetHeight;
                b.style.animation = `fillProgress ${ms}ms linear forwards`;
            });

            setTimeout(() => {
                woordEl.innerText = ""; 
                document.querySelectorAll('.progress-wrapper').forEach(p => p.style.visibility = 'hidden');
                
                if(mode==='normaal'){
                    document.getElementById('btn-herhaal').style.display = 'block';
                    woordenTeller++; document.getElementById('word-counter-display').innerText = `Woorden: ${woordenTeller}`;
                    if(woordenTeller%10===0) spawnReward();
                    document.getElementById('start-btn-main').disabled = false;
                    document.getElementById('start-btn-main').innerText = "VOLGENDE";
                } else {
                    document.getElementById('btn-goed').style.display = 'block';
                    document.getElementById('btn-fout').style.display = 'block';
                }
            }, ms);
        }

        function toetsAntwoord(goed) {
            woordenTeller++; if(goed) goedTeller++;
            document.getElementById('btn-goed').style.display = 'none';
            document.getElementById('btn-fout').style.display = 'none';
            document.getElementById('start-btn-main').disabled = false;
            document.getElementById('start-btn-main').innerText = "VOLGENDE";
            
            if(woordenTeller >= MAX_TOETS_WOORDEN || uniekeToetsLijst.length===0) {
                stopSpel();
            }
        }

        function updateTimerDisplay() {
            const min = Math.floor(resterendeTijd/60), sec = resterendeTijd%60;
            document.getElementById('timer-display').innerText = `${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
        }

        function herhaalWoord() { document.getElementById('btn-herhaal').style.display = 'none'; document.getElementById('woord').innerText = huidigFlitsWoord; }

        function stopSpel(isH) {
            const stopTijdMS = Date.now();
            clearInterval(interval); document.getElementById('timer-display').style.opacity = '0';
            
            const verstrekenSec = Math.floor((stopTijdMS - startTijdMS) / 1000);
            const vMin = Math.floor(verstrekenSec / 60);
            const vSec = verstrekenSec % 60;
            document.getElementById('eind-tijd-display').innerText = `Verstreken tijd: ${vMin.toString().padStart(2,'0')}:${vSec.toString().padStart(2,'0')}`;

            document.getElementById('eind-verzameling').innerHTML = verdiendeLijst.join(' ');
            const wolk = document.getElementById('woorden-wolk-container'); wolk.innerHTML = '';
            geschiedenis.forEach(w => { const s = document.createElement('span'); s.style.color='#aaa'; s.style.padding='4px 8px'; s.innerText=w; wolk.appendChild(s); });
            document.getElementById('eind-scherm').style.display = 'flex';
            document.getElementById('eind-resultaat').innerText = mode==='toets'?`Score: ${goedTeller}/${woordenTeller}`:`Je oefende ${woordenTeller} woorden!`;
            if(mode==='normaal' || (mode==='toets' && woordenTeller >= MAX_TOETS_WOORDEN)) startConfetti();
        }

        function spawnReward() {
            if(beschikbareIcoontjes.length===0) return;
            const container = document.getElementById('reward-container');
            const i = document.createElement('div'); i.className = 'beloning-icoon';
            
            const gekozen = beschikbareIcoontjes.splice(Math.floor(Math.random()*beschikbareIcoontjes.length), 1)[0];
            verdiendeLijst.push(gekozen); i.innerText = gekozen;
            document.getElementById('reward-counter').innerText = `🎁: ${verdiendeLijst.length} / 100`;
            
            const noGoZone = document.getElementById('woord-groep').getBoundingClientRect();
            const marge = 25; 
            const icoonGrootte = 40;

            const minTop = 85; 
            const maxBottom = window.innerHeight - 185; 

            let posX, posY, overlap = true;
            let pogingen = 0;

            while(overlap && pogingen < 100) {
                pogingen++;
                posX = Math.random() * (window.innerWidth - icoonGrootte - 20) + 10;
                posY = Math.random() * (maxBottom - minTop) + minTop;

                const icoonLinks = posX;
                const icoonRechts = posX + icoonGrootte;
                const icoonBoven = posY;
                const icoonOnder = posY + icoonGrootte;

                const overlapHorizontaal = icoonRechts > (noGoZone.left - marge) && icoonLinks < (noGoZone.right + marge);
                const overlapVerticaal = icoonOnder > (noGoZone.top - marge) && icoonBoven < (noGoZone.bottom + marge);

                if (!(overlapHorizontaal && overlapVerticaal)) {
                    overlap = false; 
                }
            }
            
            i.style.left = posX + 'px';
            i.style.top = posY + 'px';
            container.appendChild(i);
        }

        function startConfetti() {
            const canvas = document.getElementById('confetti-canvas'); const ctx = canvas.getContext('2d');
            canvas.style.display = 'block'; canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            const p = Array.from({length:200}, () => ({ x:Math.random()*canvas.width, y:Math.random()*canvas.height-canvas.height, w:8, h:10, color:`hsl(${Math.random()*360},100%,60%)`, vx:Math.random()*4-2, vy:Math.random()*5+2, r:Math.random()*360, rv:Math.random()*10-5 }));
            function draw() { ctx.clearRect(0,0,canvas.width,canvas.height); p.forEach(p => { p.y+=p.vy; p.x+=p.vx; p.r+=p.rv; ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.r*Math.PI/180); ctx.fillStyle=p.color; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h); ctx.restore(); }); requestAnimationFrame(draw); }
            draw();
        }

        generateStars();
        initLijsten();
    </script>
</body>
</html>
