<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ploegen Rooster</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300&display=swap" rel="stylesheet">
    <style>
        :root {
            /* De vaste kleuren voor de bollen */
            --c-o: #FFE082; /* Ochtend: Zonnegeel */
            --c-m: #90CAF9; /* Middag: Hemelblauw */
            --c-n: #D1C4E9; /* Nacht: Lavendelpaars */
            
            /* Thema kleuren (Licht) */
            --bg: #e0e4e8; 
            --surf: #ffffff; 
            --prim: #2c3e50; 
            --on-surf: #333333;
        }
        
        [data-theme="dark"] {
            /* Thema kleuren (Donker) */
            --bg: #1a1c1e; 
            --surf: #2d2f31; 
            --prim: #8ab4f8; 
            --on-surf: #e2e2e6;
        }
        
        .s-box.dot-hl { color: #333333 !important; }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Roboto', sans-serif; 
            font-weight: 300; 
            background: var(--bg); 
            color: var(--on-surf); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        .content { 
            flex: 1; 
            overflow-y: auto; 
            padding: 4px; 
            -webkit-overflow-scrolling: touch; 
            padding-bottom: 160px; 
        }

        .month-header { 
            padding: 25px 8px 8px; 
            font-weight: 300; 
            color: var(--prim); 
            font-size: 1.5em; 
            border-bottom: 1px solid var(--prim); 
            text-transform: uppercase; 
        }

        .grid-main { display: grid; grid-template-columns: 26px repeat(7, 1fr); gap: 4px; width: 100%; margin-top: 8px; }
        
        .grid-label { 
            font-size: 11px; 
            font-weight: 300; 
            opacity: 0.6; 
            text-align: center; 
            padding-bottom: 6px; 
        }

        .week-num { 
            font-size: 11px; 
            font-weight: 300; 
            color: var(--on-surf);
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: rgba(0,0,0,0.08); 
            height: 65px; 
            border-radius: 10px; 
        }
        [data-theme="dark"] .week-num { background: rgba(255,255,255,0.05); }
        
        .day-cell { 
            background: var(--surf); 
            height: 65px; 
            border-radius: 10px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; 
            border: 1px solid rgba(0,0,0,0.05); 
            padding-top: 4px; 
        }
        
        .day-num { 
            font-size: 17px; 
            font-weight: 300; 
            height: 22px; 
            display: flex; 
            align-items: center; 
            margin-bottom: 2px; 
        }

        .shift-info { flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; }

        .today-highlight { 
            border: 2px solid var(--prim) !important; 
            background: rgba(44, 62, 80, 0.02); 
        }

        .shift-row { display: flex; gap: 2px; justify-content: center; align-items: center; width: 100%; height: 100%; }
        
        .s-box { 
            position: relative; 
            width: 16px; 
            height: 22px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 1; 
            font-size: 14px; 
            font-weight: 300; 
            color: var(--on-surf); 
        }

        .dot-hl::before { 
            content: ''; 
            position: absolute; 
            width: 24px; 
            height: 24px; 
            border-radius: 50%; 
            z-index: -1; 
            top: -1px; 
            left: -4px; 
        }
        .dot-o::before { background-color: var(--c-o); }
        .dot-m::before { background-color: var(--c-m); }
        .dot-n::before { background-color: var(--c-n); }

        #todayBtn { 
            position: fixed; bottom: 95px; right: 16px; 
            background: #2c3e50; color: white; border: none; 
            border-radius: 12px; padding: 12px 18px; 
            font-weight: 300; z-index: 999; font-size: 13px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
            font-family: 'Roboto', sans-serif;
        }

        .bottom-nav { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            z-index: 1000; 
            background: rgba(44, 62, 80, 0.5); /* Iets meer transparantie */
            backdrop-filter: blur(12px); /* Minder blur voor betere zichtbaarheid in Light Mode */
            -webkit-backdrop-filter: blur(12px);
            padding-bottom: env(safe-area-inset-bottom);
            display: flex; 
            height: 75px; 
            align-items: center; 
            justify-content: space-around;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; height: 100%; border: none; background: none; }
        .nav-item.active { background: rgba(255,255,255,0.08); }
        .nav-label { font-size: 10px; font-weight: 300; text-transform: uppercase; margin-top: 4px; }
        .nav-icon { font-size: 20px; }

        .ploeg-select-wrapper { flex: 1.2; display: flex; justify-content: center; align-items: center; height: 100%; }
        #ploegSelect { 
            background: #ffffff; color: #2c3e50; border: none; 
            padding: 8px 10px; border-radius: 8px; font-weight: 300; 
            font-size: 15px; width: 90%; outline: none; font-family: 'Roboto', sans-serif;
        }
    </style>
</head>
<body>

<button id="todayBtn" onclick="scrollToToday('smooth')">VANDAAG</button>
<div class="content" id="viewer"></div>

<nav class="bottom-nav">
    <div class="ploeg-select-wrapper">
        <select id="ploegSelect" onchange="render()">
            <option value="1">Ploeg 1</option>
            <option value="2">Ploeg 2</option>
            <option value="3">Ploeg 3</option>
            <option value="4">Ploeg 4</option>
            <option value="5">Ploeg 5</option>
        </select>
    </div>
    <button id="btn-month-ind" class="nav-item active" onclick="setView('month-ind')">
        <span class="nav-icon">🗓️</span>
        <span class="nav-label" id="label-ind">Ploeg</span>
    </button>
    <button id="btn-month-all" class="nav-item" onclick="setView('month-all')">
        <span class="nav-icon">👥</span>
        <span class="nav-label">Alle Ploegen</span>
    </button>
    <button class="nav-item" onclick="toggleTheme()">
        <span class="nav-icon">🌓</span>
        <span class="nav-label">Thema</span>
    </button>
</nav>

<script>
    let curView = 'month-ind';
    const REF = new Date(2026, 4, 5); 
    const OFFSETS = { "1": 28, "2": 7, "3": 21, "4": 0, "5": 14 };
    const cycle = [];
    const add = (n, t) => { for(let i=0; i<n; i++) cycle.push(t); };
    add(4,'o'); add(2,'v'); add(3,'m'); add(1,'v'); add(4,'n'); add(4,'v');
    add(3,'o'); add(2,'v'); add(4,'m'); add(1,'v'); add(3,'n'); add(4,'v');

    function getS(p, d) {
        const target = new Date(d.getFullYear(), d.getMonth(), d.getDate());
        const diff = Math.floor((target - REF) / 86400000);
        let idx = (OFFSETS[p] + diff) % 35;
        return cycle[idx < 0 ? idx + 35 : idx];
    }

    function getWeekNumber(d) {
        let tempDate = new Date(d.getTime());
        tempDate.setDate(tempDate.getDate() + 4 - (tempDate.getDay() || 7));
        let yearStart = new Date(tempDate.getFullYear(), 0, 1);
        return Math.ceil((((tempDate - yearStart) / 86400000) + 1) / 7);
    }

    function render() {
        const container = document.getElementById('viewer');
        const selectEl = document.getElementById('ploegSelect');
        if (!container || !selectEl) return;
        
        const selP = selectEl.value;
        try { localStorage.setItem('gekozenPloeg', selP); } catch(e) {}
        
        document.getElementById('label-ind').innerText = 'Ploeg ' + selP;
        const todayStr = new Date().toDateString();
        let html = '';
        const startDate = new Date(); startDate.setFullYear(startDate.getFullYear() - 1); startDate.setDate(1); 
        const endDate = new Date(); endDate.setFullYear(endDate.getFullYear() + 2); endDate.setMonth(endDate.getMonth() + 1, 0); 
        
        const months = ["Januari","Februari","Maart","April","Mei","Juni","Juli","Augustus","September","Oktober","November","December"];
        const dayLabels = ['W','M','D','W','D','V','Z','Z'];
        let lastMonth = -1;

        for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
            const isToday = d.toDateString() === todayStr;
            const shift = getS(selP, d);
            const todayClass = isToday ? 'today-highlight' : '';
            const todayId = isToday ? 'id="today"' : '';

            if (d.getMonth() !== lastMonth) {
                if (lastMonth !== -1) html += `</div>`;
                html += `<div class="month-header">${months[d.getMonth()]} ${d.getFullYear()}</div><div class="grid-main">`;
                dayLabels.forEach(l => html += `<div class="grid-label">${l}</div>`);
                html += `<div class="week-num">${getWeekNumber(d)}</div>`;
                let firstDayOfMonth = new Date(d.getFullYear(), d.getMonth(), 1).getDay();
                let padding = firstDayOfMonth === 0 ? 6 : firstDayOfMonth - 1;
                for(let p=0; p<padding; p++) html += `<div style="background:transparent;"></div>`;
                lastMonth = d.getMonth();
            } else if (d.getDay() === 1) {
                html += `<div class="week-num">${getWeekNumber(d)}</div>`;
            }

            let cellContent = `<div class="day-cell ${todayClass}" ${todayId}>`;
            cellContent += `<span class="day-num">${d.getDate()}</span>`;
            cellContent += `<div class="shift-info">`;
            
            if (curView === 'month-all') {
                let o="-", m="-", n="-";
                for(let p=1; p<=5; p++) { 
                    let s = getS(p.toString(), d); 
                    if(s==='o') o=p; if(s==='m') m=p; if(s==='n') n=p; 
                }
                cellContent += `<div class="shift-row">
                    <span class="s-box s-o ${selP == o ? 'dot-hl dot-o' : ''}">${o}</span>
                    <span class="s-box s-m ${selP == m ? 'dot-hl dot-m' : ''}">${m}</span>
                    <span class="s-box s-n ${selP == n ? 'dot-hl dot-n' : ''}">${n}</span>
                </div>`;
            } else {
                if(shift !== 'v') {
                    cellContent += `<span class="s-box s-${shift} dot-hl dot-${shift}">${shift.toUpperCase()}</span>`;
                }
            }
            cellContent += `</div></div>`;
            html += cellContent;
        }
        container.innerHTML = html + `</div>`;
    }

    function scrollToToday(behavior = 'smooth') {
        const todayEl = document.getElementById('today');
        const container = document.getElementById('viewer');
        if (todayEl && container) {
            const scrollPos = todayEl.offsetTop - (container.offsetHeight / 2) + (todayEl.offsetHeight / 2);
            container.scrollTo({ top: scrollPos, behavior: behavior });
        }
    }

    function setView(v) { 
        curView = v; 
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active')); 
        const btn = document.getElementById('btn-' + v);
        if(btn) btn.classList.add('active'); 
        render(); 
    }

    function toggleTheme() { 
        const isDark = document.body.hasAttribute('data-theme');
        if (isDark) {
            document.body.removeAttribute('data-theme');
            localStorage.setItem('thema_rooster', 'light');
        } else {
            document.body.setAttribute('data-theme', 'dark');
            localStorage.setItem('thema_rooster', 'dark');
        }
    }
    
    function initApp() {
        const savedTheme = localStorage.getItem('thema_rooster');
        if (savedTheme === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
        }
        const selectEl = document.getElementById('ploegSelect');
        const savedPloeg = localStorage.getItem('gekozenPloeg');
        if (selectEl && savedPloeg) {
            selectEl.value = savedPloeg;
        }
        render();
        setTimeout(() => scrollToToday('auto'), 300);
    }

    window.onload = initApp;
</script>
</body>
</html>
